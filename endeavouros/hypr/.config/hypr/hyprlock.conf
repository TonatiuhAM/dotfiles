# ╔══════════════════════════════════════════╗
# ║           HYPRLOCK CONFIGURATION         ║
# ╚══════════════════════════════════════════╝

# ── Fondo con blur de la pantalla idle ──────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Reloj: HORAS (grande, centrado) ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I")"
    color = rgba(255, 255, 255, 0.92)
    font_size = 72
    font_family = JetBrains Mono Bold

    position = 0, 180
    halign = center
    valign = center
}

# ── Reloj: MINUTOS (debajo de las horas) ────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(255, 255, 255, 0.75)
    font_size = 72
    font_family = JetBrains Mono Bold

    position = 0, 80
    halign = center
    valign = center
}

# ── Nombre de usuario ────────────────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.92)
    font_size = 18
    font_family = JetBrains Mono

    position = 0, -30
    halign = center
    valign = center
}

# ── Input de contraseña (estilo terminal) ────────────────────────────────────
input-field {
    monitor =
    size = 300, 45
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = -1      # cuadrado / sin redondeo

    # Colores del marco y fondo
    outer_color = rgba(255, 255, 255, 1.0)     # marco blanco
    inner_color = rgba(10, 10, 10, 0.92)      # fondo casi negro
    font_color  = rgba(255, 255, 255, 0.92)   # texto/asteriscos en blanco
    fade_on_empty = false

    # Placeholder y comportamiento
    placeholder_text = <span foreground="##ffffff" font_family="JetBrains Mono">passwd: _</span>
    hide_input = false      # los asteriscos se muestran; ponlo en true para ocultarlos completamente
    rounding = 0            # bordes rectos (cuadrado)

    check_color  = rgba(255, 255, 255, 1.0)
    fail_color   = rgba(255, 60, 60, 1.0)
    fail_text    = <span font_family="JetBrains Mono">[ acceso denegado ]</span>
    fail_timeout = 2000

    position = 0, -90
    halign = center
    valign = center
}
