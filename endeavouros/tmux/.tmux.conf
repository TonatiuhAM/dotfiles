# ===================================================================
# ┌─' Configuración General (Comportamiento) ──────────────────────┐
# ===================================================================

# Cambiar el prefijo a Ctrl + a (más cómodo en móvil/teclado pequeño)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Habilitar el ratón (útil para scroll en terminales que lo soporten)
set -g mouse on

# Iniciar ventanas y paneles desde 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mejorar el tiempo de respuesta (especialmente para Neovim)
set -g escape-time 0
set -g history-limit 10000

# Configuración de color para que Neovim se vea bien
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===================================================================
# ├─' Interfaz  ─────────────────────────────────┤
# ===================================================================

# These are the default values used inside the plugin to achieve the preview shown above.

set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#698DDA"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator-str "  tmux  "
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "bottom"

# Enables or disables the left and right status bar
set -g @minimal-tmux-right true
set -g @minimal-tmux-left true

# expanded icon (fullscreen icon)
set -g @minimal-tmux-expanded-icon "󰊓 "

# on all tabs (default is false)
# false will make it visible for the current tab only
set -g @minimal-tmux-show-expanded-icon-for-all-tabs true

# To add or remove extra text in status bar
set -g @minimal-tmux-status-right-extra ""
set -g @minimal-tmux-status-left-extra ""

# To make the selection box rounded () or edged <>
# Default is nothing, when set to true default is edged
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

# Not recommended to change these values
set -g @minimal-tmux-status-right "#S"

# If getting strings cut in left status or right
# Here 20 is the length of the characters in the string
set -g status-right-length 20
set -g status-left-length 20

# ===================================================================
# ├─' Navegación y Atajos (Estilo Vim y Estándar) ──────────────────┤
# ===================================================================

# Modo copia en modo Vi
set-window-option -g mode-keys vi

# Recargar configuración
bind r source-file ~/.tmux.conf \; display "Configuración limpia recargada!"

# Splits y ventanas
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind w kill-pane

# Navegar entre paneles con h/j/k/l (Prefix + letra)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- NUEVOS ATAJOS PARA VENTANAS ---
# Navegar entre ventanas con Prefix + p/n
bind p previous-window
bind n next-window

# Redimensionar paneles
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# Pantalla completa del panel actual (Zoom)
bind m resize-pane -Z

# Mantener el popup de Lazygit
bind g display-popup -d '#{pane_current_path}' -w 80% -h 80% -E lazygit


# ===================================================================
# ├─' Modo Copia (Sustituto manual de tmux-yank) ───────────────────┤
# ===================================================================

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Copia al buffer de tmux (para el sistema suele requerir OSC52 en el terminal)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ===================================================================
# └─' Plguins ────────────────────────────────────┘
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'niksingh710/minimal-tmux-status'

# Inicializar TPM (debe ser la última línea)
run '~/.tmux/plugins/tpm/tpm'

