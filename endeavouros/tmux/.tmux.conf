# ===================================================================
# ┌─' Configuración General (Comportamiento) ──────────────────────┐
# ===================================================================

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Habilitar el ratón para que el "touch" funcione (clic en ventanas/paneles)
set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===================================================================
# ├─' Lógica de Interfaz Dinámica (SSH vs Local) ──────────────────┤
# ===================================================================

if-shell '[ -n "$SSH_CONNECTION" ]' {
    # --- CONFIGURACIÓN PARA MÓVIL (SSH) ---
    set -g @minimal-tmux-status "top"    # Pestañas arriba para que no las tape el teclado
    set -g @minimal-tmux-bg "#FF8700"    # Color naranja distintivo
    set -g @minimal-tmux-indicator-str "  MOBILE  "
} {
    # --- TU CONFIGURACIÓN ACTUAL (LOCAL) ---
    set -g @minimal-tmux-fg "#000000"
    set -g @minimal-tmux-bg "#698DDA"
    set -g @minimal-tmux-indicator-str "  tmux  "
    set -g @minimal-tmux-status "bottom"
}

# Configuración estética compartida
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-right true
set -g @minimal-tmux-left true
set -g @minimal-tmux-expanded-icon "󰊓 "
set -g @minimal-tmux-show-expanded-icon-for-all-tabs true
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""
set -g @minimal-tmux-status-right "#S"
set -g status-right-length 20
set -g status-left-length 20

# ===================================================================
# ├─' Navegación y Atajos (Estilo Vim y Estándar) ──────────────────┤
# ===================================================================

set-window-option -g mode-keys vi

# Recargar configuración
bind r source-file ~/.tmux.conf \; display "Interfaz adaptada cargada!"

# Atajos de gestión (Vim style)
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind w kill-pane

# Navegar entre paneles con h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegar entre ventanas
bind p previous-window
bind n next-window

# Zoom y Lazygit
bind m resize-pane -Z
bind g display-popup -d '#{pane_current_path}' -w 80% -h 80% -E lazygit

# ===================================================================
# └─' Plugins (Solo lo esencial) ───────────────────────────────────┘
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'niksingh710/minimal-tmux-status'

run '~/.tmux/plugins/tpm/tpm'
