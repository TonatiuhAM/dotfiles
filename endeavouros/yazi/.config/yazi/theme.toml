# : Manager [[[

[mgr]
cwd = { fg = "#e9e0e7" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ff7773", bg = "#ff7773" }
marker_cut      = { fg = "#ffdad9", bg = "#ffdad9" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#f4b7b7", bg = "#f4b7b7" }

# Count
count_copied   = { fg = "#331112", bg = "#ffdad9" }
count_cut      = { fg = "#331112", bg = "#ffdad9" }
count_selected = { fg = "#432255", bg = "#f4b7b7" }

# Border
border_symbol = "│"
border_style  = { fg = "#e1b7f5" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#e1b7f5", bold = true, bg = "#161217" }
inactive  = { fg = "#d3c0d8", bg = "#161217" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#e1b7f5", fg = "#432255", bold = true }
normal_alt  = { bg = "#4b444d", fg = "#cec3ce" }

# Select mode
select_main = { bg = "#d3c0d8", fg = "#382c3e", bold = true }
select_alt  = { bg = "#4b444d", fg = "#cec3ce" }

# Unset mode
unset_main = { bg = "#f4b7b7", fg = "#4c2526", bold = true }
unset_alt  = { bg = "#4b444d", fg = "#cec3ce" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#91629e" }
perm_write = { fg = "#e03232" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ff4540" }
perm_sep   = { fg = "#cd40ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#e1b7f5", bg = "#3d383d" }
progress_error  = { fg = "#ffb4ab", bg = "#3d383d" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3d383d" }
cand = { fg = "#e1b7f5" }
rest = { fg = "#432255" }
desc = { fg = "#e9e0e7" }
separator = " ▶ "
separator_style = { fg = "#e9e0e7" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#f4b7b7" }
title_warn  = { fg = "#e1b7f5" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#e1b7f5" }
active = { fg = "#f4b7b7", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#e1b7f5" }
value  = { fg = "#e9e0e7" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#e1b7f5", bg = "#432255" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#e1b7f5" }
title   = {}
hovered = { fg = "#ffdad9", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e9e0e7" }
run    = { fg = "#e9e0e7" }
footer = { fg = "#382c3e", bg = "#d3c0d8" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e9e0e7" },
    { url = "*/", fg = "#e1b7f5" },
]

# : ]]]
