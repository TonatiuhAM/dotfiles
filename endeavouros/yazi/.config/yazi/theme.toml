# : Manager [[[

[mgr]
cwd = { fg = "#dfe4dc" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#66cde7", bg = "#66cde7" }
marker_cut      = { fg = "#beeaf5", bg = "#beeaf5" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#a2ced9", bg = "#a2ced9" }

# Count
count_copied   = { fg = "#001f25", bg = "#beeaf5" }
count_cut      = { fg = "#001f25", bg = "#beeaf5" }
count_selected = { fg = "#00391a", bg = "#a2ced9" }

# Border
border_symbol = "│"
border_style  = { fg = "#97d5a4" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#97d5a4", bold = true, bg = "#101510" }
inactive  = { fg = "#b7ccb8", bg = "#101510" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#97d5a4", fg = "#00391a", bold = true }
normal_alt  = { bg = "#414941", fg = "#c1c9bf" }

# Select mode
select_main = { bg = "#b7ccb8", fg = "#223526", bold = true }
select_alt  = { bg = "#414941", fg = "#c1c9bf" }

# Unset mode
unset_main = { bg = "#a2ced9", fg = "#01363f", bold = true }
unset_alt  = { bg = "#414941", fg = "#c1c9bf" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#618963" }
perm_write = { fg = "#428da0" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#39bfe1" }
perm_sep   = { fg = "#32d952" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#97d5a4", bg = "#353a35" }
progress_error  = { fg = "#ffb4ab", bg = "#353a35" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#353a35" }
cand = { fg = "#97d5a4" }
rest = { fg = "#00391a" }
desc = { fg = "#dfe4dc" }
separator = " ▶ "
separator_style = { fg = "#dfe4dc" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#a2ced9" }
title_warn  = { fg = "#97d5a4" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#97d5a4" }
active = { fg = "#a2ced9", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#97d5a4" }
value  = { fg = "#dfe4dc" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#97d5a4", bg = "#00391a" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#97d5a4" }
title   = {}
hovered = { fg = "#beeaf5", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dfe4dc" }
run    = { fg = "#dfe4dc" }
footer = { fg = "#223526", bg = "#b7ccb8" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dfe4dc" },
    { url = "*/", fg = "#97d5a4" },
]

# : ]]]
